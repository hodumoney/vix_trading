name: daily-buy-alert

on:
  schedule:
    # 한국시간(KST=UTC+9) 밤 11시 = UTC 14:00.
    - cron: "0 14 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼 (테스트용)

permissions:
  contents: read

concurrency:
  group: buy-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send buy-signal to Telegram
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python notify.py
