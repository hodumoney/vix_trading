name: daily-vix-update

on:
  schedule:
    - cron: "30 23 * * 2-6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        run: python update.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git config user.name  "vix-dca-bot"
            git config user.email "actions@github.com"
            git add data.json
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no change"
          fi
